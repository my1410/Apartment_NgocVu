services:
  mongo:
    image: mongo:7
    container_name: apartment-ngocvu-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: apartment-ngocvu-api
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      CLIENT_URL: ${CLIENT_URL:-http://localhost:8080,http://127.0.0.1:8080}
      MONGODB_URI: mongodb://mongo:27017/apartment_platform
      JWT_SECRET: ${JWT_SECRET:-docker-local-jwt-secret-change-me}
      COOKIE_SECRET: ${COOKIE_SECRET:-docker-local-cookie-secret-change-me}
      DATA_ENCRYPTION_KEY: ${DATA_ENCRYPTION_KEY:-docker-local-data-encryption-key-change-me}
      COOKIE_SAMESITE: lax
      COOKIE_SECURE: false
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/api}
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
    container_name: apartment-ngocvu-web
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  mongo-data:
